repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: npx prettier --write
        types_or: [html, json, markdown, yaml]

      - id: zizmor
        name: zizmor
        language: system
        entry: zizmor
        files: '^\.github/workflows/.*\.yml$'
        pass_filenames: true
